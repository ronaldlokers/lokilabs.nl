<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="'Fira Code', ui-monospace, Menlo, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E9622E"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A69C90"/>
    </marker>
  </defs>

  <rect width="960" height="640" fill="#FBF8F4"/>

  <!-- git repo -->
  <rect x="60" y="40" width="300" height="86" rx="12" fill="#EFEBE4" stroke="#DCD6D1"/>
  <text x="84" y="76" font-size="16" font-weight="700" fill="#231E1B">git repo</text>
  <text x="84" y="102" font-size="11" fill="#76706C">github.com/ronaldlokers/homelab</text>

  <!-- renovate -->
  <rect x="60" y="170" width="300" height="66" rx="12" fill="#FBF8F4" stroke="#DCD6D1" stroke-dasharray="5 4"/>
  <text x="84" y="198" font-size="14" font-weight="700" fill="#76706C">renovate</text>
  <text x="84" y="220" font-size="11.5" fill="#A69C90">dependency update PRs</text>
  <path d="M 210 170 L 210 132" stroke="#A69C90" stroke-width="2" fill="none" marker-end="url(#arrow-muted)"/>

  <!-- fluxcd -->
  <rect x="560" y="40" width="340" height="86" rx="12" fill="#562C8B"/>
  <text x="584" y="76" font-size="16" font-weight="700" fill="#FBF8F4">fluxcd</text>
  <text x="584" y="102" font-size="12" fill="#C9B8E8">reconciles cluster state from git</text>

  <!-- git -> flux -->
  <path d="M 360 72 L 552 72" stroke="#E9622E" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="380" y="60" font-size="11.5" fill="#E9622E">pull &amp; reconcile</text>

  <!-- flux -> cluster -->
  <path d="M 730 126 L 730 172" stroke="#E9622E" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="744" y="156" font-size="11.5" fill="#E9622E">apply</text>

  <!-- production cluster -->
  <rect x="392" y="180" width="508" height="326" rx="16" fill="#EFEBE4" stroke="#DCD6D1"/>
  <text x="420" y="216" font-size="15" font-weight="700" fill="#231E1B">k3s cluster — production</text>
  <text x="420" y="238" font-size="11.5" fill="#76706C">3 × raspberry pi cm5 · HA control plane</text>

  <!-- nodes -->
  <rect x="420" y="258" width="140" height="88" rx="10" fill="#FBF8F4" stroke="#DCD6D1"/>
  <text x="438" y="288" font-size="13.5" font-weight="700" fill="#562C8B">cm5-01</text>
  <text x="438" y="310" font-size="10.5" fill="#76706C">control-plane</text>
  <text x="438" y="328" font-size="10.5" fill="#76706C">etcd</text>

  <rect x="576" y="258" width="140" height="88" rx="10" fill="#FBF8F4" stroke="#DCD6D1"/>
  <text x="594" y="288" font-size="13.5" font-weight="700" fill="#562C8B">cm5-02</text>
  <text x="594" y="310" font-size="10.5" fill="#76706C">control-plane</text>
  <text x="594" y="328" font-size="10.5" fill="#76706C">etcd</text>

  <rect x="732" y="258" width="140" height="88" rx="10" fill="#FBF8F4" stroke="#DCD6D1"/>
  <text x="750" y="288" font-size="13.5" font-weight="700" fill="#562C8B">cm5-03</text>
  <text x="750" y="310" font-size="10.5" fill="#76706C">control-plane</text>
  <text x="750" y="328" font-size="10.5" fill="#76706C">etcd</text>

  <!-- etcd quorum line -->
  <path d="M 490 346 L 490 366 L 802 366 L 802 346" stroke="#DCD6D1" stroke-width="1.5" fill="none"/>
  <path d="M 646 346 L 646 366" stroke="#DCD6D1" stroke-width="1.5" fill="none"/>
  <text x="646" y="384" font-size="10.5" fill="#A69C90" text-anchor="middle">etcd quorum — survives one node loss</text>

  <!-- storage / network bands -->
  <rect x="420" y="400" width="220" height="42" rx="9" fill="#FBF8F4" stroke="#DCD6D1"/>
  <text x="438" y="426" font-size="12" fill="#231E1B">longhorn <tspan fill="#76706C">· 3-replica</tspan></text>

  <rect x="652" y="400" width="220" height="42" rx="9" fill="#FBF8F4" stroke="#DCD6D1"/>
  <text x="670" y="426" font-size="12" fill="#231E1B">metallb <tspan fill="#76706C">· load bal.</tspan></text>

  <rect x="420" y="452" width="452" height="42" rx="9" fill="#FBF8F4" stroke="#DCD6D1"/>
  <text x="438" y="478" font-size="12" fill="#231E1B">prometheus + grafana <tspan fill="#76706C">· dashboards &amp; alerting</tspan></text>

  <!-- staging -->
  <rect x="60" y="300" width="280" height="120" rx="12" fill="#FBF8F4" stroke="#DCD6D1" stroke-dasharray="5 4"/>
  <text x="84" y="334" font-size="14" font-weight="700" fill="#76706C">k3d — staging</text>
  <text x="84" y="358" font-size="11.5" fill="#A69C90">mirrors production — you don't</text>
  <text x="84" y="376" font-size="11.5" fill="#A69C90">test in prod. not even at home.</text>
  <text x="84" y="402" font-size="10.5" fill="#A69C90">← same fluxcd reconcile loop</text>

  <!-- caption -->
  <text x="60" y="560" font-size="12" fill="#76706C">nothing applied by hand — the git history</text>
  <text x="60" y="580" font-size="12" fill="#76706C">is the change log.</text>
  <text x="60" y="614" font-size="13" font-weight="700" fill="#231E1B">/lokilabs <tspan fill="#E9622E">$</tspan> <tspan fill="#76706C" font-weight="400">homelab architecture</tspan></text>
</svg>
